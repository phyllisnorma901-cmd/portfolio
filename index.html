<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>DEPTH CORE</title>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Helvetica, Arial;
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* ナビ */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  z-index: 100;
}

.logo {
  font-weight: bold;
  letter-spacing: 2px;
}

.menu {
  cursor: pointer;
}

/* メニューオーバーレイ */
.menu-panel {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #000;
  top: 0;
  left: 0;
  transform: translateY(-100%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* セクション */
section {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ヒーロー */
.hero {
  perspective: 1200px;
}

.hero h1 {
  font-size: 80px;
  letter-spacing: 10px;
}

/* 背景 */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
  filter: blur(10px);
}

/* プロダクト */
.product img {
  width: 400px;
  border-radius: 20px;
}

/* フッター */
footer {
  height: 50vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">CORE</div>
  <div class="menu">MENU</div>
</div>

<div class="menu-panel">
  <h2>ABOUT</h2>
  <h2>PRODUCT</h2>
  <h2>CONTACT</h2>
</div>

<section class="hero">
  <div class="bg"></div>
  <h1>DEPTH</h1>
</section>

<section class="product">
  <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
</section>

<section>
  <h2>ENGINEERED FOR DEPTH</h2>
</section>

<footer>
  © CORE EXPERIENCE
</footer>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ヒーロー */
gsap.from(".hero h1", {
  scale: 0.5,
  opacity: 0,
  duration: 1
});

/* 背景パララックス */
gsap.to(".bg", {
  scale: 1.3,
  y: -200,
  filter: "blur(2px)",
  scrollTrigger: {
    scrub: true
  }
});

/* プロダクト出現 */
gsap.fromTo(".product img",
  {
    scale: 0.5,
    opacity: 0,
    z: -300,
    filter: "blur(10px)"
  },
  {
    scale: 1.5,
    opacity: 1,
    z: 300,
    y: -200,
    filter: "blur(0px)",
    scrollTrigger: {
      trigger: ".product",
      start: "top center",
      scrub: true
    }
  }
);

/* ピン留め */
ScrollTrigger.create({
  trigger: ".product",
  start: "top top",
  end: "+=150%",
  pin: true,
  scrub: true
});

/* メニュー */
const menu = document.querySelector(".menu");
const panel = document.querySelector(".menu-panel");

menu.addEventListener("click", () => {
  gsap.to(panel, { y: "100%", duration: 0.8 });
});
</script>

</body>
</html>
