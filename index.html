<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Into the Depth</title>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  height: 500vh;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* 固定ステージ */
.stage {
  position: fixed;
  width: 100%;
  height: 100vh;
  perspective: 1200px;
  overflow: hidden;
}

/* 共通レイヤー */
.layer {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 背景 */
.bg {
  background: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
  filter: blur(8px);
  opacity: 0.5;
}

/* 中間テキスト */
.text {
  font-size: 40px;
  letter-spacing: 4px;
  opacity: 0;
}

/* プロダクト */
.product img {
  width: 300px;
  border-radius: 20px;
}

/* 手前レイヤー */
.front {
  font-size: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="stage">
  
  <!-- 背景 -->
  <div class="layer bg"></div>

  <!-- テキスト -->
  <div class="layer text">INTO THE DEPTH</div>

  <!-- プロダクト -->
  <div class="layer product">
    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
  </div>

  <!-- 前景 -->
  <div class="layer front">SCROLL</div>

</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* 背景（遠い） */
gsap.to(".bg", {
  scale: 1.2,
  y: -100,
  filter: "blur(2px)",
  scrollTrigger: {
    scrub: true
  }
});

/* テキスト（フェード＋奥から） */
gsap.fromTo(".text",
  { opacity: 0, y: 100, z: -200 },
  {
    opacity: 1,
    y: -100,
    z: 100,
    scrollTrigger: {
      scrub: true
    }
  }
);

/* プロダクト（メイン演出） */
gsap.fromTo(".product img",
  {
    scale: 0.5,
    opacity: 0,
    z: -300,
    filter: "blur(10px)"
  },
  {
    scale: 1.5,
    opacity: 1,
    z: 300,
    y: -200,
    filter: "blur(0px)",
    scrollTrigger: {
      scrub: true
    }
  }
);

/* 前景（速い動き） */
gsap.to(".front", {
  y: -300,
  opacity: 0,
  scrollTrigger: {
    scrub: true
  }
});

/* ピン留め（没入） */
ScrollTrigger.create({
  trigger: "body",
  start: "top top",
  end: "+=300%",
  scrub: true,
  pin: true
});
</script>

</body>
</html>
