<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VOID WORKS</title>

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* セクション */
section {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ヒーロー */
.hero {
  perspective: 1200px;
}

.hero h1 {
  font-size: 60px;
  letter-spacing: 8px;
}

/* 背景 */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") center/cover;
  filter: blur(6px);
  opacity: 0.5;
}

/* プロダクト */
.product img {
  width: 300px;
  border-radius: 20px;
}

/* テキスト */
.text {
  max-width: 600px;
  text-align: center;
  line-height: 1.6;
}

/* フッター */
footer {
  padding: 40px;
  text-align: center;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="bg"></div>
  <h1>VOID WORKS</h1>
</section>

<!-- ABOUT -->
<section>
  <div class="text">
    <h2>ABOUT</h2>
    <p>
      We design products born from emptiness.  
      Precision, depth, and silence define our work.
    </p>
  </div>
</section>

<!-- PRODUCT -->
<section class="product">
  <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
</section>

<!-- TECHNOLOGY -->
<section>
  <div class="text">
    <h2>TECHNOLOGY</h2>
    <p>
      Advanced machining and engineering create  
      products that exist beyond the surface.
    </p>
  </div>
</section>

<!-- CONTACT -->
<section>
  <div class="text">
    <h2>CONTACT</h2>
    <p>contact@voidworks.jp</p>
  </div>
</section>

<footer>© VOID WORKS</footer>

<script>
gsap.registerPlugin(ScrollTrigger);

/* HERO 奥行き */
gsap.from(".hero h1", {
  scale: 0.5,
  opacity: 0,
  duration: 1
});

/* 背景パララックス */
gsap.to(".bg", {
  scale: 1.2,
  y: -100,
  filter: "blur(2px)",
  scrollTrigger: {
    scrub: true
  }
});

/* テキスト */
gsap.from(".text", {
  y: 50,
  opacity: 0,
  stagger: 0.2,
  scrollTrigger: {
    trigger: ".text",
    start: "top 80%"
  }
});

/* プロダクト出現 */
gsap.fromTo(".product img",
  {
    scale: 0.6,
    opacity: 0,
    filter: "blur(10px)",
    z: -200
  },
  {
    scale: 1.3,
    opacity: 1,
    filter: "blur(0px)",
    z: 200,
    scrollTrigger: {
      trigger: ".product",
      start: "top center",
      scrub: true
    }
  }
);
</script>

</body>
</html>
